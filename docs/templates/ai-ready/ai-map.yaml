project:
  name: "<project-name>"
  summary: "<one-line summary>"
  goals:
    - "<goal-1>"
    - "<goal-2>"
  non_goals:
    - "<non-goal-1>"

ownership:
  maintainers:
    - "<team-or-owner>"
  code_owners_file: "<path-or-none>"

commands:
  setup: "<setup command>"
  dev: "<dev command>"
  test: "<test command>"
  lint: "<lint command>"
  typecheck: "<typecheck command>"
  build: "<build command>"
  run: "<run command>"

architecture:
  style: "<monolith|modular|hexagonal|microservices|other>"
  entrypoints:
    - "<entrypoint-1>"
  modules:
    - name: "<module-name>"
      path: "<path>"
      responsibility: "<what it owns>"
      depends_on:
        - "<module-name>"
      side_effects:
        - "<db writes|network|filesystem|queue>"
      risk_level: "<low|medium|high>"

runtime:
  environments:
    - name: "local"
      required_env:
        - "<ENV_KEY>"
    - name: "ci"
      required_env:
        - "<ENV_KEY>"
    - name: "prod"
      required_env:
        - "<ENV_KEY>"

invariants:
  security:
    - "<invariant>"
  data_consistency:
    - "<invariant>"
  reliability:
    - "<invariant>"
  performance:
    - "<invariant/budget>"

quality_gates:
  required_checks:
    - "lint"
    - "typecheck"
    - "unit-tests"
  block_merge_if:
    - "critical invariant violated"
    - "required checks failing"

operations:
  runbook_path: "docs/RUNBOOK.md"
  rollback_strategy: "<brief rollback approach>"
  migration_strategy: "<how schema/data migrations are handled>"

change_policy:
  max_pr_size: "<e.g. 500 LOC>"
  requires_design_note_when:
    - "<condition>"
  required_reviewers:
    - "<role/team>"
